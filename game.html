<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра — Akanchik Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <a href="index.html" class="back-link">← На главную</a>
  <img src="akanchik.png" alt="Akanchik Games" class="logo">
  <button class="add-game-btn" onclick="window.open('https://forms.gle/Ws5PiZebbpYAbHGg7', '_blank')">
    <span>➕</span> Добавить игру
  </button>
</header>

  <main class="game-info">
    <div class="game-header">
      <h2 id="game-title"></h2>
      <div class="game-meta">
        <span class="game-rating" id="game-rating"></span>
        <span class="game-category" id="game-category"></span>
        <span class="game-author" id="game-author"></span>
      </div>
      <div class="game-meta-secondary">
        <span class="meta-item" id="game-release"></span>
        <span class="meta-item" id="game-duration"></span>
        <span class="meta-item" id="game-difficulty"></span>
      </div>
    </div>
    
    <div class="game-content">
      <div class="game-media-section">
        <div id="game-media" class="game-media"></div>
        
        <div class="game-info-card">
          <h3>🏷️ Жанры</h3>
          <div class="tags-container" id="game-genre"></div>
        </div>
        
        <div class="game-info-card">
          <h3>🔤 Языки</h3>
          <div class="tags-container" id="game-language"></div>
        </div>
      </div>
      
      <div class="game-details">
        <div class="description-card">
          <h3>📖 Описание</h3>
          <p id="game-description"></p>
        </div>
        
        <div class="game-features">
          <h3>🎮 Особенности игры</h3>
          <ul id="game-features-list"></ul>
        </div>
        
        <div class="game-info-card">
          <h3>🎯 Управление</h3>
          <p id="game-controls" class="controls-info"></p>
        </div>
        
        <div class="game-info-card">
          <h3>🏷️ Теги</h3>
          <div class="tags-container" id="game-tags"></div>
        </div>
        
        <button id="play-button" class="play-btn">
          🎮 Играть сейчас
        </button>
        
        <div class="game-actions">
          <button class="action-btn" onclick="shareGame()">📤 Поделиться</button>
          <button class="action-btn" onclick="addToFavorites()">❤️ В избранное</button>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
